<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Heaven</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .header {
            height: 120px;
            width: 100%;
            background-color: pink;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: rgb(0, 200, 255);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            border: 2px solid black;
        }

        .menu{
            display: flex;
            margin-top: 10px;
            width: 50%;
            justify-content: space-evenly;
            align-items: center;
            color: brown;
            font-family: 'Trebuchet MS', Arial, sans-serif;
        }

        .content{
            min-height: 400px;
            width: 100%;
            background-color: azure;

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .img{
            height: 300px;
            width: 180px;
            border: 1px solid black; 
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            background-color: darkgray;

            transition: 0.3s;
        }

        .img:hover {
            transform: scale(1.05);
        }

        img{
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
        }

        .footer{
            background-color: pink;
            text-align: center;
            height: 50px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Ice Cream Heaven</h1>

        <div class="menu">
            <h3>Home</h3>
            <h3>Flavors</h3>
            <h3>Order</h3>
            <h3>About</h3>
        </div>
    </div>

    <div class="content">

        <div class="img"> 
            <img src="pic1.jpg" alt="Ice Cream">
            <h2>Vanilla</h2>
            <p>Classic creamy delight</p>
        </div>

        <div class="img"> 
            <img src="pic1.jpg" alt="Ice Cream">
            <h2>Chocolate</h2>
            <p>Rich chocolate flavor</p>
        </div>

        <div class="img"> 
            <img src="pic1.jpg" alt="Ice Cream">
            <h2>Strawberry</h2>
            <p>Fresh fruity taste</p>
        </div>

        <div class="img"> 
            <img src="pic1.jpg" alt="Ice Cream">
            <h2>Mango</h2>
            <p>Sweet tropical flavor</p>
        </div>

        <div class="img"> 
            <img src="pic1.jpg" alt="Ice Cream">
            <h2>Butterscotch</h2>
            <p>Crispy caramel goodness</p>
        </div>

    </div>

    <div class="footer">
        <h3 style="padding-top:15px;">@2026 Heaven Ice Cream - Made with Love ❤️</h3>
    </div>

</body>
</html>
