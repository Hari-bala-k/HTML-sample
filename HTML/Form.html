<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag's</title>
</head>
<body>
    <Center>
     <h1>Form Tags</h1>
     <form action="#" style="padding-left: 30%; padding-right: 30%;">
        <fieldset>
            <legend>Login Form</legend>
        <label for="username">Username :</label>
        <input type="text" id="username" name="username" placeholder="Enter your name">
        <br>
        <label for="password">Password :</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
        <br>
        <label for="email">Email ID :</label>
        <input type="email" id="email" name="email" placeholder="Enter your mail">
        <br>
        <br>
         <button type="submit">Submit</button> &nbsp;&nbsp; &nbsp; &nbsp;
         <button type="reset">Cancle</button>
         </fieldset>
     </form>
     <br>
     <br>
     <form action="#"  style="padding-left: 30%; padding-right: 30%;">
        <h2>Other Tags</h2>
        <fieldset>
            <legend>Tags</legend>
        
        <label for="">Gender :</label>
        <label for="male">Male</label>
        <input type="radio" id="male" name="male" >
        <label for="female">Female</label>
        <input type="radio" id="female" name="male">
        <br>
        <br>
        <label for="">Audio</label>
        <input type="range" min="1" max="10">
        <br>
        <br>
        <label for="">Upload File :</label>
        <input type="file">
        <br>
        <br>
        <label for="">Upload Image :</label>
        <input type="image">
        <br>
        <br>
        <label for="">Color :</label>
        <input type="color">
        <br>
        <br>
         <label for="">Menu :</label>
         <br>
         <label for="">Apple</label>
         <input type="checkbox">
         <label for="">Orange</label>
         <input type="checkbox">
         <label for="">Graps</label>
         <input type="checkbox">
         </fieldset>
     </form>
     <h2>Select Tag</h2>
     <label for="">Select Course</label>
     <select name="course" id="">
        <option value="">HTML</option>
        <option value="">CSS</option>
        <option value="">Java Script</option>
     </select>
     <br>
     <br>
     <form action=""style="padding-left: 30%; padding-right: 30%;">
     <fieldset >
        <legend>Comment</legend>
     <textarea name="" id=""></textarea>
     </fieldset>
     </form>
     </Center>
</body>
</html>
