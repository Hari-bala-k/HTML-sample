<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <center>
        <form action="">
        <h1>Form Validation</h1>
        <hr>
        <label for="username">UserName :</label>
        <input type="text" name="username" id="username" pattern="^[A-Za-z]{1,15}$" required>
        <br>
        <br>
        <label for="number">PhoneNo :</label>
        <input type="text" name="phone number" id="number" pattern="^\d{10}$" required>
        <br>
        <br>
        <button type="submit">Submit</button>
        </form>
    </center>
</body>
</html>
