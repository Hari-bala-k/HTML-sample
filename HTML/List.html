<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Tags</title>
</head>
<body>
    <h1>Order List</h1>
    <ol type="A" start="26">
        <li >one</li>
        <li>two</li>
        <li>three</li>
    </ol>
    <h1>Unorder List</h1>
    <ul>
        <li type="circle">apple</li>
        <li>orange</li>
        <li type="square">graps</li>
    </ul>
    <h2>List</h2>

     <dl>
        <dt>Features</dt>
        <dd>this is like good fruits</dd>
     </dl>    
</body>
</html>
